name: tox

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:

    runs-on: ubuntu-latest
    container: snakepacker/python:all

    strategy:
      matrix:
        linter:
          - lint
          - mypy

    steps:
      - uses: actions/checkout@v4
      - name: Install tox 4.49.0
        run: python3 -m pip install "tox==4.49.0"
      - name: Run tox ${{ matrix.linter }}
        run: tox
        env:
          TOXENV: ${{ matrix.linter }}

  build:
    needs: lint
    runs-on: ubuntu-latest
    container: snakepacker/python:all

    services:
      postgres:
        image: postgres:18-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test

    strategy:
      fail-fast: false

      matrix:
        toxenv:
          - py310
          - py311
          - py312
          - py313
          - py314

    steps:
      - uses: actions/checkout@v4
      - name: Install tox 4.49.0
        run: python3 -m pip install "tox==4.49.0"
      - name: Run tox ${{ matrix.toxenv }}
        run: tox
        env:
          FORCE_COLOR: 1
          TOXENV: ${{ matrix.toxenv }}
          PG_DSN: postgres://test:test@postgres:5432/test
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
